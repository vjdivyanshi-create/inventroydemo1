<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); font-family: 'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
        .form-container { max-width: 600px; margin: 3rem auto; background: white; padding: 2.5rem 2rem; border-radius: 1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .form-header { text-align: center; margin-bottom: 1.5rem; }
        .form-header h2 { font-size: 1.75rem; font-weight: 600; color: #1f2937; }
        .form-header p { color: #4b5563; }
        .input-field { width: 100%; padding: .75rem 1rem; border: 1px solid #d1d5db; border-radius: .5rem; margin-top: .5rem; transition: border-color .2s, box-shadow .2s; }
        .input-field:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); outline: none; }
        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-weight: 500; color: #374151; }
        .btn-submit { background: #1f2937; color: white; transition: background .2s, transform .2s; }
        .btn-submit:hover { background: #111827; transform: translateY(-1px); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-400 via-slate-600 to-blue-100 text-slate-800">
    <!-- Header and sidebar copied from inventory page -->
    <header class="bg-white/80 backdrop-blur-md shadow-md border-b border-slate-300/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button class="md:hidden p-2 rounded-md text-slate-600 hover:text-slate-800" onclick="toggleMenu()">
                    <i class="fas fa-bars fa-lg"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex items-center justify-center text-white font-bold">
                        <i class="fas fa-dolly"></i>
                    </div>
                    <a href="dashboard.html" class="text-2xl font-bold text-slate-800 hover:text-blue-600 transition">Inventory Hub</a>
                </div>
            </div>
            <nav class="flex items-center gap-6">
                <button class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-700 transition">
                    <i class="fas fa-bell"></i>
                    <span class="text-xs">Alerts</span>
                </button>
                <a href="login_page.html" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-red-100 hover:bg-red-200 text-red-600 hover:text-red-700 transition text-sm font-medium">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="hidden sm:inline">Logout</span>
                </a>
            </nav>
        </div>
    </header>
    <div id="overlay" class="hidden fixed inset-0 bg-black/30 md:hidden z-30" onclick="toggleMenu()"></div>
    <div class="flex min-h-screen">
        <aside id="sidebar" class="sidebar fixed md:relative w-64 md:w-auto h-screen md:h-auto bg-white/90 backdrop-blur-md border-r border-slate-300/50 md:border-r-0 z-40 md:z-0 transform md:transform-none md:w-56">
            <div class="p-6 space-y-8">
                <div class="hidden md:block"></div>
                
                <nav class="space-y-1">
                    <h3 class="text-xs font-semibold text-slate-600 uppercase tracking-wider px-3 mb-4">Main Menu</h3>
                    
                    <a href="dashboard.html" class="menu-item flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-100/80 text-blue-700 border border-blue-300/30">
                        <i class="fas fa-chart-line w-5"></i>
                        <span>Dashboard</span>
                    </a>
                    
                    <a href="inventory.html" class="menu-item flex items-center gap-3 px-4 py-3 rounded-lg text-slate-700 hover:bg-slate-100">
                        <i class="fas fa-list w-5"></i>
                        <span>Inventory List</span>
                    </a>

                    <a href="Add_product.html" class="menu-item flex items-center gap-3 px-4 py-3 rounded-lg text-slate-700 hover:bg-slate-100">
                        <i class="fas fa-box w-5"></i>
                        <span>Add Product</span>
                    </a>
                    
                    <a href="report.html" class="menu-item flex items-center gap-3 px-4 py-3 rounded-lg text-slate-700 hover:bg-slate-100">
                        <i class="fas fa-chart-bar w-5"></i>
                        <span>Report</span>
                    </a>
                    
                </nav>

                <nav class="space-y-1">
                    <h3 class="text-xs font-semibold text-slate-600 uppercase tracking-wider px-3 mb-4">Tools</h3>
                    
                    <a href="setting.html" class="menu-item flex items-center gap-3 px-4 py-3 rounded-lg text-slate-700 hover:bg-slate-100">
                        <i class="fas fa-cog w-5"></i>
                        <span>Settings</span>
                    </a>
                    
                    <a href="export.html" class="menu-item flex items-center gap-3 px-4 py-3 rounded-lg text-slate-700 hover:bg-slate-100">
                        <i class="fas fa-file-export w-5"></i>
                        <span>Export</span>
                    </a>
                </nav>
            </div>
        </aside>
        <main class="flex-1 overflow-x-hidden">
            <div class="form-container fade-in">
                <div class="form-header">
                    <h2>Add New Product</h2>
                    <p>Provide details to add an item to inventory</p>
                </div>
                <form id="productForm">
                    <div class="input-group">
                        <label for="name">Product Name</label>
                        <input id="name" type="text" name="name" class="input-field" required placeholder="e.g. Wireless Mouse">
                    </div>
                    <div class="input-group">
                        <label for="sku">SKU</label>
                        <input id="sku" type="text" name="sku" class="input-field" required placeholder="e.g. MOU-002">
                    </div>
                    <div class="input-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" class="input-field">
                            <option>Electronics</option>
                            <option>Furniture</option>
                            <option>Stationery</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="quantity">Quantity</label>
                        <input id="quantity" type="number" name="quantity" class="input-field" min="0" required>
                    </div>
                    <div class="input-group">
                        <label for="price">Price</label>
                        <input id="price" type="number" name="price" class="input-field" step="0.01" min="0" required>
                    </div>
                    <div class="flex justify-end mt-6">
                        <button type="submit" class="btn-submit px-6 py-2 rounded-lg">Save Product</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('hidden-mobile');
            overlay.classList.toggle('hidden');
        }
        // simple form handler (mock AJAX)
        $('#productForm').on('submit', function(e) {
            e.preventDefault();
            const vals = {};
            $(this).serializeArray().forEach(item => { vals[item.name] = item.value; });
            // read existing inventory, assign next id and default status
            const inventory = JSON.parse(localStorage.getItem('inventory')) || [];
            const nextId = inventory.length ? Math.max(...inventory.map(i=>i.id)) + 1 : 1;
            const quantity = parseInt(vals.quantity,10);
            const status = quantity > 0 ? (quantity < 10 ? 'low' : 'in') : 'out';
            inventory.push({
                id: nextId,
                name: vals.name,
                sku: vals.sku,
                category: vals.category,
                quantity: quantity,
                price: parseFloat(vals.price),
                status: status
            });
            localStorage.setItem('inventory', JSON.stringify(inventory));
            alert('Product saved');
            this.reset();
            // optionally navigate back to inventory page
            window.location.href = 'inventory.html';
        });
    </script>
</body>
</html>
