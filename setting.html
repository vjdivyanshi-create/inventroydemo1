<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Inventory Hub</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="min-h-screen bg-gradient-to-br from-slate-400 via-slate-600 to-blue-100 text-slate-800">

<!-- HEADER -->
<header class="bg-white/80 backdrop-blur-md shadow-md border-b sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-blue-600 text-white flex items-center justify-center rounded-lg">
<i class="fas fa-dolly"></i>
</div>
<a href="dashboard.html" class="text-xl font-bold">Inventory Hub</a>
</div>

<nav class="flex items-center gap-4">
<button class="px-3 py-2 bg-slate-200 rounded-lg">
<i class="fas fa-bell"></i>
</button>

<a href="login_page.html" class="px-4 py-2 bg-red-100 text-red-600 rounded-lg">
Logout
</a>
</nav>

</div>
</header>


<div class="flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-56 bg-white/90 backdrop-blur-md border-r">

<div class="p-6">

<h3 class="text-xs font-semibold text-slate-600 uppercase mb-4">
Main Menu
</h3>

<a href="dashboard.html"
class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-100">
<i class="fas fa-chart-line"></i>
Dashboard
</a>

<a href="inventory.html"
class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-100">
<i class="fas fa-list"></i>
Inventory List
</a>

<a href="Add_product.html"
class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-100">
<i class="fas fa-box"></i>
Add Product
</a>

<a href="report.html"
class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-100">
<i class="fas fa-chart-bar"></i>
Report
</a>


<h3 class="text-xs font-semibold text-slate-600 uppercase mt-6 mb-4">
Tools
</h3>

<a href="setting.html"
class="flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-100 text-blue-700">
<i class="fas fa-cog"></i>
Settings
</a>

<a href="export.html"
class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-100">
<i class="fas fa-file-export"></i>
Export
</a>

</div>
</aside>


<!-- MAIN CONTENT -->
<main class="flex-1 p-8">

<h2 class="text-3xl font-bold mb-6">
Settings
</h2>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

<!-- Profile Settings -->
<div class="bg-white rounded-xl p-6 shadow">

<h3 class="text-lg font-semibold mb-4">Profile Settings</h3>

<input id="name" class="w-full border p-2 rounded mb-3"
placeholder="Full Name">

<input id="email" class="w-full border p-2 rounded mb-3"
placeholder="Email">

<button id="saveProfile"
class="bg-blue-600 text-white px-4 py-2 rounded">
Save
</button>

</div>


<!-- Password Settings -->
<div class="bg-white rounded-xl p-6 shadow">

<h3 class="text-lg font-semibold mb-4">Change Password</h3>

<input type="password" id="oldPass"
class="w-full border p-2 rounded mb-3"
placeholder="Old Password">

<input type="password" id="newPass"
class="w-full border p-2 rounded mb-3"
placeholder="New Password">

<button id="savePassword"
class="bg-green-600 text-white px-4 py-2 rounded">
Update Password
</button>

</div>


<!-- Notification Settings -->
<div class="bg-white rounded-xl p-6 shadow">

<h3 class="text-lg font-semibold mb-4">Notifications</h3>

<label class="flex items-center gap-3 mb-2">
<input type="checkbox" id="emailAlert">
Email Alerts
</label>

<label class="flex items-center gap-3">
<input type="checkbox" id="lowStockAlert">
Low Stock Alerts
</label>

</div>


<!-- System Settings -->
<div class="bg-white rounded-xl p-6 shadow">

<h3 class="text-lg font-semibold mb-4">System Settings</h3>

<select id="theme"
class="w-full border p-2 rounded mb-3">
<option value="light">Light Mode</option>
<option value="dark">Dark Mode</option>
</select>

<button id="saveSystem"
class="bg-purple-600 text-white px-4 py-2 rounded">
Save Settings
</button>

</div>

</div>

</main>
</div>



<script>

const settingsJSON = {
name:"Admin",
email:"admin@email.com",
emailAlert:true,
lowStockAlert:true,
theme:"light"
}


function loadSettings(){

$("#name").val(settingsJSON.name)
$("#email").val(settingsJSON.email)

$("#emailAlert").prop("checked",settingsJSON.emailAlert)
$("#lowStockAlert").prop("checked",settingsJSON.lowStockAlert)

$("#theme").val(settingsJSON.theme)

}


$("#saveProfile").click(function(){

$.ajax({
url:"#",
type:"POST",
data:{
name:$("#name").val(),
email:$("#email").val()
},
success:function(){
alert("Profile updated")
}
})

})


$("#savePassword").click(function(){

$.ajax({
url:"#",
type:"POST",
data:{
oldPassword:$("#oldPass").val(),
newPassword:$("#newPass").val()
},
success:function(){
alert("Password updated")
}
})

})


$("#saveSystem").click(function(){

$.ajax({
url:"#",
type:"POST",
data:{
theme:$("#theme").val(),
emailAlert:$("#emailAlert").is(":checked"),
lowStock:$("#lowStockAlert").is(":checked")
},
success:function(){
alert("Settings saved")
}
})

})


$(document).ready(function(){
loadSettings()
})

</script>

</body>
</html>
