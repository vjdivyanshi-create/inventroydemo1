<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center 
             bg-gradient-to-br from-slate-400 via-slate-600 to-blue-100">

    <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">
            Login to Your Account
        </h2>

        <form class="space-y-4" id="loginpage">

            <!-- Email -->
            <div>
                <label class="block text-slate-600 mb-1 font-medium">Email</label>
                <input type="email" id="email"
                       placeholder="Enter your email"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg
                              text-slate-700
                              focus:outline-none focus:ring-2 focus:ring-blue-400
                              focus:border-blue-400">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-slate-600 mb-1 font-medium">Password</label>
                <input type="password" id="password"
                       placeholder="Enter your password"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg
                              text-slate-700
                              focus:outline-none focus:ring-2 focus:ring-blue-400
                              focus:border-blue-400">
            </div>

            <!-- Login Button -->
            <div>
                <button type="submit"
                        class="w-full py-2 rounded-lg font-semibold text-white
                               bg-gradient-to-r from-blue-600 to-blue-700
                               hover:from-blue-700 hover:to-blue-800
                               transition duration-200 shadow-md shadow-blue-200">
                    Login
                </button>
            </div>

            <!-- Sign-up Link -->
            <div class="text-center">
                <p class="text-slate-600">
                    Don't have an account?
                    <a href="signup.html" class="text-blue-600 hover:text-blue-700 font-medium hover:underline">
                        Sign up
                    </a>
                </p>
            </div>

        </form>
    </div>

    <!-- java script -->
     <script>
        
        document.getElementById("loginpage").addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (email === "" || password === "") {
                alert("Please fill in all fields.");
                return;
            }

            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!email.match(emailPattern)) {
                alert("Please enter a valid email address.");
                return;
            }

            // OPTIONAL: Login check using localStorage (matches signup page)
            const storedUser = JSON.parse(localStorage.getItem("user"));

            if (!storedUser) {
                alert("No account found. Redirecting to sign up...");
                window.location.href = "signup.html";   
                return;
            }

            if (email === storedUser.email && password === storedUser.password) {
                alert("Login successful!");
                window.location.href = "dashboard.html";
            } else {
                alert("Invalid email or password.");
            }
        });
     </script>

</body>
</html>
