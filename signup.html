<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center 
             bg-gradient-to-br from-slate-400 via-slate-600 to-blue-100">

    <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-slate-800 mb-6">
            Create Your Account
        </h2>

        <form id="signupForm" class="space-y-4">

            <!-- Name -->
            <div>
                <label class="block text-slate-600 mb-1 font-medium">Full Name</label>
                <input type="text" id="name"
                       placeholder="Enter your name"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg
                              text-slate-700
                              focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-slate-600 mb-1 font-medium">Email</label>
                <input type="email" id="email"
                       placeholder="Enter your email"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg
                              text-slate-700
                              focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-slate-600 mb-1 font-medium">Password</label>
                <input type="password" id="password"
                       placeholder="Enter password"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg
                              text-slate-700
                              focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-slate-600 mb-1 font-medium">Confirm Password</label>
                <input type="password" id="confirmPassword"
                       placeholder="Re-enter password"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg
                              text-slate-700
                              focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Sign Up Button -->
            <div>
                <button type="submit"
                        class="w-full py-2 rounded-lg font-semibold text-white
                               bg-gradient-to-r from-blue-600 to-blue-700
                               hover:from-blue-700 hover:to-blue-800
                               transition duration-200 shadow-md shadow-blue-200">
                    Sign Up
                </button>
            </div>

            <!-- Login Link -->
            <div class="text-center">
                <p class="text-slate-600">
                    Already have an account?
                    <a href="login_page.html"
                       class="text-blue-600 hover:text-blue-700 font-medium hover:underline">
                        Login
                    </a>
                </p>
            </div>

        </form>
    </div>

    <!-- JavaScript -->
    <script>
    const form = document.getElementById("signupForm");

    form.addEventListener("submit", function (e) {
        e.preventDefault();

        let isValid = true;

        const name = document.getElementById("name");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");

        // Clear previous errors
        clearError(name);
        clearError(email);
        clearError(password);
        clearError(confirmPassword);

        // Name validation
        if (name.value.trim() === "") {
            setError(name, "Full name is required");
            isValid = false;
        }

        // Email validation
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (email.value.trim() === "") {
            setError(email, "Email is required");
            isValid = false;
        } else if (!email.value.match(emailPattern)) {
            setError(email, "Enter a valid email address");
            isValid = false;
        }

        // Password validation
        if (password.value === "") {
            setError(password, "Password is required");
            isValid = false;
        } else if (password.value.length < 3) {
            setError(password, "Password must be at least 3 characters");
            isValid = false;
        }

        // Confirm password validation
        if (confirmPassword.value === "") {
            setError(confirmPassword, "Please confirm your password");
            isValid = false;
        } else if (password.value !== confirmPassword.value) {
            setError(confirmPassword, "Passwords do not match");
            isValid = false;
        }

        if (isValid) {
            window.location.href = "dashboard.html";
        }
    });

    function setError(input, message) {
        input.classList.add("border-red-500");

        const id = input.id + "-error";
        let error = input.parentNode.querySelector('#' + id);

        if (!error) {
            error = document.createElement("p");
            error.id = id;
            error.classList.add("text-red-500", "text-sm", "mt-1", "error-message");
            error.setAttribute('role','alert');
            error.setAttribute('aria-live','polite');
            input.insertAdjacentElement('afterend', error);
        }

        input.setAttribute('aria-describedby', id);
        error.innerText = message;
    }

    function clearError(input) {
        input.classList.remove("border-red-500");

        const id = input.id + "-error";
        const error = input.parentNode.querySelector('#' + id);
        if (error) {
            error.remove();
        }
        input.removeAttribute('aria-describedby');
    }
</script>

</body>
</html>
